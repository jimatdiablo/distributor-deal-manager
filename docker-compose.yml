services:
  mysql:
    image: mysql:8.0
    container_name: ddm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DDM_MYSQL_ROOT_PASSWORD:-change-me-root}
      MYSQL_DATABASE: ${DDM_DB_NAME:-distdb}
      MYSQL_USER: ${DDM_DB_USER:-ddm_app}
      MYSQL_PASSWORD: ${DDM_DB_PASS:-change-me}
    ports:
      - "127.0.0.1:${DDM_DB_HOST_PORT:-3307}:3306"
    volumes:
      - ddm_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d

volumes:
  ddm_mysql_data:
