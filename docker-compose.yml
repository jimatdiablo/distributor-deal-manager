services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    ports:
      - "127.0.0.1:${DDM_APP_PORT:-8080}:8080"
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DDM_MYSQL_ROOT_PASSWORD:-change-me-root}
      MYSQL_DATABASE: ${DB_NAME:-distdb}
      MYSQL_USER: ${DB_USER:-ddm}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
    ports:
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    volumes:
      - ddm_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d

volumes:
  ddm_mysql_data:
